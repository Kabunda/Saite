<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplayer Text Game</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/klava.css">
</head>
<body>
  <div id="app">
    <!-- Экран авторизации -->
  <section id="auth-screen" class="screen">
    <h1>Вход в игру</h1>
    
    <!-- Блок Email/Password -->
    <div id="email-auth-block">
      <input type="email" id="email-input" placeholder="Email" autocomplete="email">
      <input type="password" id="password-input" placeholder="Пароль" autocomplete="current-password">
      <button id="email-login-btn">Войти</button>
      <button id="email-register-btn">Регистрация</button>
      <div id="email-auth-error" style="color:red; margin-top:5px;"></div>
    </div>
    
    <hr>
    
    <button id="google-login-btn">Google</button>
    <button id="yandex-login-btn">Яндекс</button>
    <div id="auth-error"></div>
  </section>

    <!-- Главное меню -->
  <section id="menu-screen" class="screen hidden">
    <h1>Главное меню</h1>
    <div id="player-info">
      <img id="player-avatar" src="" alt="Аватар" style="width:64px; height:64px; border-radius:50%; display:none;">
      <p id="player-name"></p>
    </div>
    <button id="play-btn">Играть</button>
    <button id="logout-btn">Выйти</button>

        <!-- Список онлайн игроков -->
    <div id="online-players-container">
      <h2>Игроки онлайн</h2>
      <div id="online-players-list"></div>
    </div>

  </section>

    <!-- Поиск соперника / лобби -->
    <section id="lobby-screen" class="screen hidden">
      <h1>Поиск соперника...</h1>
      <p id="lobby-status">Ожидаем игрока</p>
      <button id="cancel-search-btn">Отмена</button>
    </section>

    <!-- Игровой экран -->
    <section id="game-screen" class="screen hidden">
      <h1>Умножение</h1>
      <div class="game-multiplication">
        <div class="game-players-scores">
          <p>Мой счёт: <span id="my-score">0</span></p>
          <p>Счёт соперника: <span id="opponent-score">0</span></p>
        </div>
        <div class="game-question-area">
          <p id="question-text" class="question">5 × 3 = ?</p>
          <p id="answer-input" class="answer-input">_</p>
          <p id="feedback-message" class="feedback"></p>
        </div>
        <!-- Цифровая клавиатура -->
        <div class="keyboard" id="multiplication-keypad">
          <div class="keyboard-row">
            <div class="key" data-key="7">7</div>
            <div class="key" data-key="8">8</div>
            <div class="key" data-key="9">9</div>
          </div>
          <div class="keyboard-row">
            <div class="key" data-key="4">4</div>
            <div class="key" data-key="5">5</div>
            <div class="key" data-key="6">6</div>
          </div>
          <div class="keyboard-row">
            <div class="key" data-key="1">1</div>
            <div class="key" data-key="2">2</div>
            <div class="key" data-key="3">3</div>
          </div>
          <div class="keyboard-row">
            <div class="key" data-key="0">0</div>
            <div class="key key-action" data-key="del">⌫</div>
            <div class="key key-action" data-key="clear">C</div>
            <div class="key key-enter" data-key="enter">✓</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Результаты -->
    <section id="result-screen" class="screen hidden">
      <h1>Результат</h1>
      <p id="result-text"></p>
      <button id="to-menu-btn">В главное меню</button>
    </section>
  </div>
  
  <script type="module" src="./js/app.js"></script>
</body>
</html>
