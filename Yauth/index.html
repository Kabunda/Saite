<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Auth with Yandex ID</title>
    <style>
        /* Простая стилизация для демонстрации */
        #profile-info {
            display: flex;
            align-items: center;
            gap: 10px; /* Расстояние между аватаром и именем */
            margin-bottom: 20px;
        }
        #profile-info img {
            width: 50px;
            height: 50px;
            border-radius: 50%; /* Делаем аватар круглым */
        }
        #login-section {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать! 1259</h1>

    <!-- Контейнер для отображения имени пользователя и аватара -->
    <!-- Скрыт по умолчанию, будет отображен после входа -->
    <div id="profile-info" style="display: none;">
        <div id="avatar-container"></div> <!-- Контейнер для аватарки -->
        <span id="username-display"></span> <!-- Элемент для имени -->
    </div>

    <!-- Кнопка входа (отображается, если пользователь не вошёл) -->
    <div id="login-section">
        <button id="yandex-auth-btn">Войти через Яндекс</button>
    </div>

    <!-- Элемент для отображения статуса (ошибок, сообщений) -->
    <div id="result"></div>

    <script src="auth.js"></script>
    <script>
        // Скрипт для управления видимостью элементов на основе наличия токена
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('yandex_access_token');
            const profileInfoDiv = document.getElementById('profile-info');
            const loginSectionDiv = document.getElementById('login-section');
            const resultDiv = document.getElementById('result'); // Элемент для статуса

            if (token) {
                console.log("Токен найден в localStorage, пытаемся получить данные профиля при загрузке.");
                // Скрываем кнопку входа
                loginSectionDiv.style.display = 'none';
                // Показываем контейнер профиля (даже если данные еще не загружены)
                profileInfoDiv.style.display = 'flex';

                // --- Вызов функции получения и отображения профиля ---
                // Создаем функцию fetchUserInfo внутри index.html, так как она была в предыдущем варианте auth.js
                async function fetchUserInfo(accessToken) {
                    try {
                        console.log('[USER_INFO_FETCH] Запрос данных пользователя...');
                        const response = await fetch('https://login.yandex.ru/info', {
                            method: 'GET',
                            headers: {
                                'Authorization': `OAuth ${accessToken}`,
                            },
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status} при получении данных пользователя.`);
                        }

                        const userInfo = await response.json();
                        console.log('[USER_INFO_RECEIVED]', userInfo);

                        // --- Вызов функции отображения ---
                        displayUserInfo(userInfo);

                    } catch (error) {
                        console.error('[USER_INFO_ERROR]', error);
                        // Обновляем только элемент результата, не трогая профиль, если он частично загрузился
                        if (resultDiv) {
                             resultDiv.textContent += ` Ошибка получения данных профиля: ${error.message}. Подробности в консоли.`;
                        } else {
                            console.warn("Элемент #result не найден для отображения ошибки.");
                        }
                         // Сбрасываем отображение профиля, если произошла ошибка после его начального показа
                         document.getElementById('avatar-container').innerHTML = '';
                         document.getElementById('username-display').textContent = '';
                         // Возможно, стоит снова показать кнопку входа или кнопку "обновить"
                    }
                }

                // --- Вызов функции отображения данных ---
                function displayUserInfo(userInfo) {
                    const nameElement = document.getElementById('username-display');
                    const avatarContainer = document.getElementById('avatar-container');
                    // const resultElement = document.getElementById('result'); // Не очищаем result здесь, чтобы не потерять предыдущие сообщения

                    if (!nameElement || !avatarContainer) {
                        console.error("Один или несколько элементов DOM (#username-display, #avatar-container) не найдены для отображения профиля.");
                        return;
                    }

                    // Имя пользователя
                    if (userInfo.real_name) {
                        nameElement.textContent = userInfo.real_name;
                    } else if (userInfo.display_name) {
                        nameElement.textContent = userInfo.display_name;
                    } else {
                        nameElement.textContent = 'Пользователь Яндекса';
                    }

                    // Аватарка
                    avatarContainer.innerHTML = ''; // Очищаем контейнер
                    if (userInfo.default_avatar_id) {
                        const avatarUrl = `https://avatars.yandex.net/get-yapic/${userInfo.default_avatar_id}/islands-200`;
                        const img = document.createElement('img');
                        img.src = avatarUrl;
                        img.alt = 'Аватар';
                        img.onerror = () => {
                            console.warn('Не удалось загрузить аватар:', avatarUrl);
                            // img.style.display = 'none'; // Можно скрыть, если аватарка не загрузилась
                        };
                        avatarContainer.appendChild(img);
                    } else {
                        console.info('Аватар недоступен у пользователя.');
                    }
                }

                // Вызываем fetchUserInfo при загрузке, если токен есть
                fetchUserInfo(token).catch(err => console.error("Ошибка в fetchUserInfo при загрузке:", err));

            } else {
                // Если токена нет, скрываем профиль и показываем кнопку входа
                profileInfoDiv.style.display = 'none';
                loginSectionDiv.style.display = 'block';
            }
        });

        // Обработка события клика по кнопке (если кнопка существует на странице при загрузке)
        // (Эта часть теперь находится внутри DOMContentLoaded, чтобы быть уверенным, что DOM загружен)
        document.getElementById('yandex-auth-btn')?.addEventListener('click', function() {
             // Очищаем результат при новом входе
             const resultDiv = document.getElementById('result');
             if (resultDiv) resultDiv.textContent = '';
             // Вызов функции из auth.js
             startYandexAuthSecure();
        });
    </script>
</body>
</html>
