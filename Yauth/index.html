<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Auth with Yandex ID</title>
</head>
<body>
    <h1>Добро пожаловать!</h1>

    <!-- Контейнер для отображения имени пользователя -->
    <div id="profile-info" style="display: none;"> <!-- Скрыто по умолчанию -->
        <div id="avatar-container"></div> <!-- Контейнер для аватарки -->
        <span id="username-display"></span> <!-- Элемент для имени -->
        <!-- Можно добавить кнопку выхода -->
        <!-- <button id="logout-btn">Выйти</button> -->
    </div>

    <!-- Кнопка входа (видна, если пользователь не вошёл) -->
    <div id="login-section">
        <button id="yandex-auth-btn">Войти через Яндекс</button>
    </div>

    <!-- Элемент для отображения статуса (ошибок, сообщений) -->
    <div id="result"></div>

    <script src="auth.js"></script>
    <script>
        // Дополнительный скрипт для управления видимостью элементов
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('yandex_access_token');
            const profileInfoDiv = document.getElementById('profile-info');
            const loginSectionDiv = document.getElementById('login-section');

            if (token) {
                // Если токен есть, показываем профиль и скрываем кнопку входа
                profileInfoDiv.style.display = 'block';
                loginSectionDiv.style.display = 'none';
            } else {
                // Если токена нет, скрываем профиль и показываем кнопку входа
                profileInfoDiv.style.display = 'none';
                loginSectionDiv.style.display = 'block';
            }

            // Добавим простую кнопку выхода (опционально)
            /*
            document.getElementById('logout-btn').addEventListener('click', function() {
                localStorage.removeItem('yandex_access_token');
                localStorage.removeItem('yandex_oauth_state'); // Также очистим state
                // Перезагрузим страницу, чтобы обновить состояние
                window.location.reload();
            });
            */
        });
    </script>
</body>
</html>
